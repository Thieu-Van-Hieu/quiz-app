name: frontend
description: "Quiz App - A Flutter application for quizzes with ObjectBox database and Riverpod state management."
publish_to: "none"
version: 1.0.1

environment:
  sdk: ^3.11.1

dependencies:
  cupertino_icons: ^1.0.9
  delightful_toast: ^1.1.0
  device_info_plus: ^12.4.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_riverpod: ^3.2.0 # nâng từ 2.6.1
  fluttertoast: ^9.0.0
  go_router: ^17.1.0
  hooks_riverpod: ^3.2.0

  # --- MAPPING & JSON ---
  dart_mappable: ^4.6.0 # nâng từ 4.2.2

  # --- DATABASE: OBJECTBOX ---
  objectbox: ^5.1.0 # nâng từ 2.5.0
  objectbox_flutter_libs: ^5.1.0

  path_provider: ^2.1.5
  riverpod_annotation: ^4.0.0 # nâng từ 2.6.1
  path: ^1.9.1
  intl: ^0.20.2
  file_picker: ^11.0.2
  auto_updater: ^1.0.0
  fl_chart: ^1.2.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- GENERATORS (Cố định bản để tránh xung đột Analyzer/Macros) ---
  dart_mappable_builder: ^4.6.0 # nâng từ 4.2.2
  objectbox_generator: ^5.1.0 # nâng từ 2.5.0
  riverpod_generator: ^4.0.3 # nâng từ 2.4.0
  build_runner: ^2.4.13 # giữ tương tự, đã là phiên bản ổn
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  windows:
    generate: true
    image_path: "assets/images/app_icon.png" # Icon cho Windows .exe

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/tessdata/
  